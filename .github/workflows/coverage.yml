name: Tests and Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install libgdiplus for System.Drawing on Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdiplus

      - name: Run tests with coverage (MTP + coverlet)
        run: |
          ./Tests/bin/Release/net10.0/Test \
            --coverlet --coverlet-output-format cobertura \
            --coverlet-output TestResults/coverage.cobertura.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/coverage.cobertura.xml
          fail_ci_if_error: true
