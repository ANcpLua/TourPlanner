name: Tests and Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tourplanner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tourplanner_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ConnectionStrings__TourPlannerDatabase: Host=127.0.0.1;Port=5432;Database=tourplanner_test;Username=postgres;Password=postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install libgdiplus for System.Drawing on Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdiplus

      - name: Run tests with coverage (MTP + coverlet)
        run: |
          ./Tests/bin/Release/net10.0/Tests \
            --coverlet --coverlet-output-format cobertura \
            --coverlet-exclude-by-file "**/Program.cs" \
            --coverlet-exclude-by-file "**/*.g.cs" \
            --coverlet-exclude-by-file "**/*.g.i.cs" \
            --coverlet-exclude-by-file "**/*.designer.cs" \
            --coverlet-exclude-by-file "**/*.Generated.cs" \
            --coverlet-exclude "[*]*.Migrations.*" \
            --coverlet-exclude-by-attribute ExcludeFromCodeCoverage \
            --coverlet-exclude-by-attribute GeneratedCodeAttribute \
            --coverlet-exclude-by-attribute CompilerGeneratedAttribute \
            --results-directory TestResults

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./TestResults/coverage.cobertura.xml
          fail_ci_if_error: true
