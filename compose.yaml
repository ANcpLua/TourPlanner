services:
  postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-tourplanner}-postgres
    image: postgres:18.3@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tourplanner-network

  pgadmin:
    container_name: ${COMPOSE_PROJECT_NAME:-tourplanner}-pgadmin
    image: dpage/pgadmin4:8.3@sha256:f1460b121383a5d61c20867ecd42535d4aabb385d32685b0e0845367ab9b86c4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_COOKIE_SAMESITE: "'Lax'"
      PGADMIN_CONFIG_WTF_CSRF_CHECK_DEFAULT: "False"
      GUNICORN_TIMEOUT: "300"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - tourplanner-network

  api:
    container_name: ${COMPOSE_PROJECT_NAME:-tourplanner}-api
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-7102}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__TourPlannerDatabase=Host=tourplanner-postgres;Port=5432;Database=postgres;Username=postgres;Password=postgres;Include Error Detail=true
      - OpenRouteServiceApiKey=CHANGE_ME
    volumes:
      - ./API/Images:/app/Images
    restart: unless-stopped
    networks:
      - tourplanner-network

  ui:
    container_name: ${COMPOSE_PROJECT_NAME:-tourplanner}-ui
    build:
      context: .
      dockerfile: Dockerfile
      target: ui
    depends_on:
      - api
    ports:
      - "${UI_PORT:-7226}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AppSettings__ApiBaseUrl=http://localhost:7102
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - tourplanner-network

volumes:
  postgres_data:

networks:
  tourplanner-network:
    driver: bridge
