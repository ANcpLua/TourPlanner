document: TeacherMaterial
version: 2026
audience: instructors
language: english

purpose:
  primary: >
    Explain how the TourPlanner requirements are structured for teaching.
  secondary: >
    Help instructors use AI-supported project work in a way that mirrors professional software delivery.

student_document:
  path: /Users/ancplua/TourPlanner/docs/Requirements.md
  role: student-facing working document

teaching_goal:
  summary: >
    Students should learn to separate product scope, acceptance conditions, and completion quality.
  students_should_distinguish:
    - what the system must do
    - what must be true for a feature to be accepted
    - what must be true before work is considered done

document_structure:
  functional_requirements:
    meaning: visible product scope
    student_use:
      - identify features
      - identify missing behavior
      - derive implementation tasks
  acceptance_criteria:
    meaning: feature acceptance conditions from a product and UX perspective
    student_use:
      - validate behavior
      - derive tests
      - check correctness beyond code existence
  definition_of_done:
    meaning: minimum delivery quality threshold
    student_use:
      - verify readiness for submission
      - check non-functional completion
      - avoid "works on my machine" thinking

suggested_teaching_use:
  workflow:
    - ask students to derive implementation tasks from functional requirements
    - ask students to derive tests from acceptance criteria
    - ask students to verify completion against the definition of done
    - ask students to explain which requirement each change satisfies
    - ask students to compare AI output against the requirements before accepting it

professional_skill_transfer:
  intended_outcomes:
    - requirement interpretation
    - acceptance-based delivery
    - quality gate thinking
    - critical use of AI as collaborator

design_decisions:
  why_not_single_assignment_text: >
    A single vague assignment text does not train structured delivery well.
  why_not_full_specification: >
    A full specification would add process overhead that is too heavy for the intended teaching use.
  chosen_balance: >
    The structure is practical, lightweight, and still close enough to real project work.

instructor_notes:
  constraints:
    - intentionally lighter than a full specification
    - focused on practical delivery discipline
    - designed for student collaboration with AI
  optional_extensions:
    - milestones
    - grading rubric
    - release goals
    - submission checklist
